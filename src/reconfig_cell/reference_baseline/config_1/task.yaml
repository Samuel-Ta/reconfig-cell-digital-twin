# FROZEN config_1 baseline — task with derived targets (spec §7 output #3).
#
# RIGID baseline: there is no generator on this path, so each target_pose is a
# HARDCODED pose literal (the spec's "accurate representation of rigid"). The
# numbers below are the concrete tool0 poses the executor commands; they were
# computed by hand from the station data and VERIFIED in Phase A (lane 1 places
# the cube at sink exactly: 0.250, 0.550, 0.140).
#
# Derivation (how each literal was obtained, kept for traceability only — the
# rigid path does NOT recompute it):
#   top-down grasp: tool0 +z -> world -z, quaternion (qx,qy,qz,qw) = (1,0,0,0)
#   pick_z  = source_top(0.10) + part_half(0.02) + gripper_attach(0.08) = 0.20
#   place_z = sink_top(0.12)   + part_half(0.02) + gripper_attach(0.08) = 0.22
#   x,y are the station x,y (base_link).
#
# A config_2 reconfiguration must edit this file too (append pick source_3 /
# place sink_3 with their own hand-computed literals) AND world.sdf AND
# scene.yaml — the synchronized-copies cost the effort metric measures.

frame_id: base_link
ops:
  - {op: pick,  station: source_1, part: cube_1,
     target_pose: {x: 0.45, y:  0.30, z: 0.20, qx: 1.0, qy: 0.0, qz: 0.0, qw: 0.0}}
  - {op: place, station: sink_1,
     target_pose: {x: 0.25, y:  0.55, z: 0.22, qx: 1.0, qy: 0.0, qz: 0.0, qw: 0.0}}
  - {op: pick,  station: source_2, part: cube_2,
     target_pose: {x: 0.45, y: -0.30, z: 0.20, qx: 1.0, qy: 0.0, qz: 0.0, qw: 0.0}}
  - {op: place, station: sink_2,
     target_pose: {x: 0.25, y: -0.55, z: 0.22, qx: 1.0, qy: 0.0, qz: 0.0, qw: 0.0}}
