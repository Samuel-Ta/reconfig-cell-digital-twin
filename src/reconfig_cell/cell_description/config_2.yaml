# config_2 — Intel warehouse conveyor cell, 3 conveyors (relay, 2 hops). This is
# config_1 with ONE conveyor appended (conveyor_3) and ONE hop appended (pick
# conveyor_2 -> place conveyor_3). conveyor_1/conveyor_2 and the first hop are
# byte-for-byte identical to config_1 — no existing entry is edited (INVARIANT 5).
# The custom nodes consume the generated artifacts unchanged: ZERO code edits.
#
# Topology: the box relays conveyor_1 -> conveyor_2 -> conveyor_3 (re-picked at
# conveyor_2 where the first hop left it).
cell: {name: config_2, robot: ur5_rg2, base_frame: base_link}

robot_mount: {x: -0.697, y: -0.643, z: 0.40}
belt: {top_z: 0.70, inward: 0.27}
part: {name: cube_1, geometry: {type: box, size: [0.04, 0.04, 0.04]}}

stations:
  - {id: conveyor_1, type: conveyor, pose: {x: -1.44596, y: -0.364014, yaw: -0.065274}}
  - {id: conveyor_2, type: conveyor, pose: {x: -0.697,    y:  0.177,    yaw: -1.570796}}
  - {id: conveyor_3, type: conveyor, pose: {x:  0.0736,   y: -0.3626,   yaw: -3.103600}}

task:
  - {op: pick,  from: conveyor_1}
  - {op: place, to:   conveyor_2}
  - {op: pick,  from: conveyor_2}
  - {op: place, to:   conveyor_3}
