# Warehouse conveyor cell — the ONLY human-authored artifact (single source of truth,
# INVARIANT 4). cell_generator compiles this into the MoveIt scene spec + the relay task
# with derived targets; the warehouse world + UR5/RG2 robot are loaded by the bringup
# (INVARIANT 1). Reconfiguration is APPEND-ONLY (INVARIANT 5): config_2 is THIS file with
# conveyor_3 and its two task ops appended — every line below is byte-for-byte identical
# inside config_2, with nothing edited, reordered, or rerouted. (The config name is taken
# from the filename, so it is not a line that differs between the two configs.)
cell: {robot: ur5_rg2, base_frame: base_link}
robot_mount: {x: -0.697, y: -0.643, z: 0.40}
belt: {top_z: 0.70, inward: 0.27}
part: {name: cube_1, geometry: {type: box, size: [0.04, 0.04, 0.04]}}
stations:
  - {id: conveyor_1, type: conveyor, pose: {x: -1.44596, y: -0.364014, yaw: -0.065274}}
  - {id: conveyor_2, type: conveyor, pose: {x: -0.697, y: 0.177, yaw: -1.570796}}
task:
  - {op: pick,  from: conveyor_1}
  - {op: place, to:   conveyor_2}
